<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROLDAN – Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: linear-gradient(135deg,#1E3A5F 0%,#0f2440 100%); }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-text">ROLDAN</div>
        <span class="logo-bar"></span>
        <p>Marketing Educacional e Contact Center BPO</p>
      </div>
      <div class="login-body">
        <h2 style="font-size:1.15rem;color:var(--primary);margin-bottom:1.25rem;">Acesso ao Sistema</h2>
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" placeholder="Seu login" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password">
        </div>
        <button class="btn-login" id="btn-login">Entrar</button>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>
  </div>

  <footer>ROLDAN Marketing Educacional e Contact Center BPO | (11) 95474-2815</footer>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (getToken()) window.location.href = '/dashboard.html';

    const btnLogin   = document.getElementById('btn-login');
    const errEl      = document.getElementById('login-error');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');

    async function doLogin() {
      errEl.style.display = 'none';
      const username = usernameEl.value.trim();
      const password = passwordEl.value;
      if (!username || !password) { showErr('Preencha usuário e senha.'); return; }

      btnLogin.textContent = 'Entrando…';
      btnLogin.disabled = true;

      try {
        const data = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        }).then(r => r.json());

        if (data.token) {
          setSession(data.token, data.user);
          window.location.href = '/dashboard.html';
        } else {
          showErr(data.error || 'Erro ao fazer login');
        }
      } catch {
        showErr('Não foi possível conectar ao servidor.');
      } finally {
        btnLogin.textContent = 'Entrar';
        btnLogin.disabled = false;
      }
    }

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    btnLogin.addEventListener('click', doLogin);
    [usernameEl, passwordEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }));
  </script>
</body>
</html>
